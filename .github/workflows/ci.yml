---
name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  guardrails:
    name: guardrails / check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      - name: Materialize configs
        run: nix develop --command true
      - name: Confirm materialization
        run: nix develop --command nix run .#confirm
      - name: Nix flake check
        run: nix flake check --print-build-logs --timeout 600

  guardrails-darwin:
    name: guardrails / check-darwin
    needs: guardrails
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Materialize configs
        run: |
          setting_pkg="$(nix build .#setting --print-out-paths --no-link)"
          "$setting_pkg/bin/sync-setting" .
      - name: Nix flake check
        run: nix flake check --print-build-logs --timeout 600
